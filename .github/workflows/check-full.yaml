name: R CMD Check & Release

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: ${{ matrix.config.os }} (R-${{ matrix.config.r }})
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: ubuntu-latest,  r: "release" }
          - { os: ubuntu-latest,  r: "devel"   }
          - { os: macos-latest,   r: "release" }
          - { os: macos-latest,   r: "devel"   }
          - { os: windows-latest, r: "release" }

    env:
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      _R_CHECK_CRAN_INCOMING_: false
      _R_CHECK_FORCE_SUGGESTS_: false
      R_LIBS_USER: ${{ github.workspace }}/.R/library

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set macOS-specific R compile flags
        if: runner.os == 'macOS'
        run: |
          echo "PKG_CPPFLAGS=-I/opt/homebrew/include -I/opt/homebrew/opt/gettext/include" >> $GITHUB_ENV
          echo "PKG_LIBS=-L/opt/homebrew/lib -L/opt/homebrew/opt/gettext/lib" >> $GITHUB_ENV

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libhdf5-dev libcurl4-openssl-dev libssl-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew list hdf5 &>/dev/null || brew install hdf5
          brew list gettext &>/dev/null || brew install gettext

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check
          cache: true

      - name: Cache PBMC 3k data
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/sclean-cache
          key: pbmc3k-${{ hashFiles('.github/workflows/check-full.yaml') }}
          restore-keys: pbmc3k-

      - name: Pre-download PBMC 3k
        env:
          SCLEAN_CACHE_DIR: ${{ runner.temp }}/sclean-cache
        run: |
          data_dir="$SCLEAN_CACHE_DIR/filtered_gene_bc_matrices/hg19"
          if [ ! -d "$data_dir" ]; then
            mkdir -p "$SCLEAN_CACHE_DIR"
            curl -fSL --retry 3 --retry-delay 30 \
              "https://cf.10xgenomics.com/samples/cell/pbmc3k/pbmc3k_filtered_gene_bc_matrices.tar.gz" \
              -o "$SCLEAN_CACHE_DIR/pbmc3k.tar.gz"
            tar -xzf "$SCLEAN_CACHE_DIR/pbmc3k.tar.gz" -C "$SCLEAN_CACHE_DIR"
          fi
          echo "SCLEAN_CACHE_DIR=$SCLEAN_CACHE_DIR" >> $GITHUB_ENV

      - name: Run R CMD check
        uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          error-on: '"warning"'

  release:
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      _R_CHECK_CRAN_INCOMING_: false
      _R_CHECK_FORCE_SUGGESTS_: false
      R_LIBS_USER: ${{ github.workspace }}/.R/library

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libhdf5-dev libcurl4-openssl-dev

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: check
          cache: true

      - name: Build source package
        run: |
          R CMD build --no-manual .
          echo "PKG_TARBALL=$(ls scLean_*.tar.gz)" >> $GITHUB_ENV
          echo "PKG_VERSION=$(echo $(ls scLean_*.tar.gz) | sed 's/scLean_//;s/\.tar\.gz//')" >> $GITHUB_ENV

      - name: Extract release notes
        run: |
          awk '/^# scLean /{if(++c>1) exit} c' NEWS.md > /tmp/release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release_body.md
          files: scLean_*.tar.gz
          name: "scLean ${{ env.PKG_VERSION }}"
