name: R CMD Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  check:
    name: ${{ matrix.config.os }} (R-${{ matrix.config.r }})
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: ubuntu-latest,  r: "release" }
          - { os: ubuntu-latest,  r: "devel"   }
          - { os: macos-latest,   r: "release" }
          - { os: macos-latest,   r: "devel"   }
          - { os: windows-latest, r: "release" }

    env:
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      _R_CHECK_CRAN_INCOMING_: false
      _R_CHECK_FORCE_SUGGESTS_: false
      R_LIBS_USER: ${{ github.workspace }}/.R/library

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set macOS-specific R compile flags
        if: runner.os == 'macOS'
        run: |
          echo "PKG_CPPFLAGS=-I/opt/homebrew/include -I/opt/homebrew/opt/gettext/include" >> $GITHUB_ENV
          echo "PKG_LIBS=-L/opt/homebrew/lib -L/opt/homebrew/opt/gettext/lib" >> $GITHUB_ENV

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libhdf5-dev libcurl4-openssl-dev libssl-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install hdf5 gettext

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - name: Restore cached R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ matrix.config.r }}-${{ hashFiles('DESCRIPTION') }}
          restore-keys: |
            ${{ runner.os }}-r-${{ matrix.config.r }}-

      - name: Install BiocManager
        run: |
          Rscript -e 'install.packages("BiocManager", repos = "https://cloud.r-project.org", quiet = TRUE)'

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::rcmdcheck
          needs: check
          cache: false

      - name: Run R CMD check
        uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          error-on: '"note"'
